<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="design-system-settings" data-post-icon-base="/assets/icons" />
    <title>Login Widget Test</title>
    <link
      href="../../node_modules/@swisspost/design-system-styles/post-default.css"
      rel="stylesheet"
    />
    <script src="../../dist/post-components/post-components.esm.js" type="module"></script>
  </head>
  <body>
    <post-login-widget>
      <a slot="unauthenticated" href="/login" data-testid="login-link">
        <span>Login</span>
        <post-icon name="arrow-right" aria-hidden="true"></post-icon>
      </a>

      <div slot="authenticated" data-testid="user-menu">
        <post-menu-trigger for="user-menu-test">
          <button class="btn btn-link" type="button">
            <post-avatar
              firstname="John"
              lastname="Doe"
              description="Current user is John Doe."
            ></post-avatar>
            <span class="visually-hidden">Access user links.</span>
          </button>
        </post-menu-trigger>
        <post-menu id="user-menu-test" label="User links">
          <div slot="header">
            <post-avatar firstname="John" lastname="Doe" aria-hidden="true"></post-avatar>
            John Doe
          </div>
          <post-menu-item>
            <a href="">
              <post-icon aria-hidden="true" name="profile"></post-icon>
              My Profile
            </a>
          </post-menu-item>
          <post-menu-item>
            <button type="button">
              <post-icon aria-hidden="true" name="logout"></post-icon>
              Logout
            </button>
          </post-menu-item>
        </post-menu>
      </div>
    </post-login-widget>
  </body>
</html>
