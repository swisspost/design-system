<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="design-system-settings" data-post-icon-base="/assets/icons" />
    <title>Login Widget Test</title>
    <link
      href="../../node_modules/@swisspost/design-system-styles/post-default.css"
      rel="stylesheet"
    />
    <script src="../../dist/post-components/post-components.esm.js" type="module"></script>
  </head>
  <body>
    <post-login-widget
      text-current-user="Current user is {user}."
      text-user-menu-trigger="Open user menu"
    >
      <a slot="login-link" href="/login" data-testid="login-link">
        <span>Login</span>
        <post-icon name="arrow-right" aria-hidden="true"></post-icon>
      </a>

      <div slot="user-links">
        <post-menu-item>
          <a href="">
            <post-icon aria-hidden="true" name="profile"></post-icon>
            My Profile
          </a>
        </post-menu-item>
        <post-menu-item>
          <button type="button">
            <post-icon aria-hidden="true" name="logout"></post-icon>
            Logout
          </button>
        </post-menu-item>
      </div>
    </post-login-widget>
  </body>
</html>
