name: Visual Tests

on:
  pull_request:
    paths:
      - 'packages/styles/visual-tests/**'
      - 'packages/styles/**'
    branches:
      - main

jobs:
  visual-tests:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies and build packages
        run: pnpm bootstrap

      - name: Install Playwright
        run: |
          pnpm add -D @playwright/test --filter design-system-styles
          pnpm exec playwright install --with-deps --filter design-system-styles

      - name: Set up cache for snapshots
        id: cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-visual-snapshots-${{ hashFiles('packages/styles/visual-tests/**') }}
          path: |
            packages/styles/visual-tests/__screenshots__
            packages/styles/visual-tests/test-results
            packages/styles/playwright-report
          restore-keys: |
            ${{ runner.os }}-visual-snapshots-

      - name: Run visual tests with server
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" != "true" ]; then
            pnpm --filter design-system-styles exec start-server-and-test 'pnpm docs:headless' http://localhost:9000 'playwright test --config=./playwright.config.ts --update-snapshots'
          else
            pnpm --filter design-system-styles exec start-server-and-test 'pnpm docs:headless' http://localhost:9000 'playwright test --config=./playwright.config.ts'
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            packages/styles/visual-tests/test-results
            packages/styles/playwright-report
          retention-days: 7
