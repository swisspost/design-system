name: Visual Regression Tests

on:
  pull_request:
    branches: [main]
  workflow_run:
    workflows: ['Deploy Documentation Preview']
    types: [completed]

jobs:
  visual-tests:
    name: Run Visual Regression Tests
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'pull_request' || (github.event.workflow_run && github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm & node
        uses: ./.github/actions/setup-pnpm

      - name: Install & bootstrap all packages
        run: |
          pnpm bootstrap

      - name: Install Playwright browsers
        run: pnpm --filter design-system-styles exec playwright install

      - name: Run visual regression tests
        run: |
          pnpm exec start-server-and-test 'pnpm docs:start' 9000 'pnpm styles:visual:test'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            visual-tests/__screenshots__/
            visual-tests/playwright-report/
            visual-tests/test-results/

      - name: Comment test results
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const message = `❌ Visual regression tests failed for [${{ github.sha }}](${{ github.repository }}/commit/${{ github.sha }})
            [View test results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number || github.event.workflow_run.pull_requests[0].number }},
              body: message
            });
