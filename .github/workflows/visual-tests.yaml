name: Visual Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/styles/**'
      - 'packages/tokens/**'
      - 'packages/documentation/**'

  workflow_dispatch:

jobs:
  visual-regression:
    name: Run Playwright Visual Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node & pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          use_cache: false

      - name: 📦 Install deps & browsers
        run: |
          pnpm install
          npx playwright install --with-deps

      - name: 💾 Cache snapshots
        uses: actions/cache@v4
        id: cache
        with:
          path: packages/styles/visual-tests/__screenshots__
          key: snapshots-${{ github.ref }}
          restore-keys: |
            snapshots-main
            snapshots-

      - name: 🪄 Generate missing snapshots (first time only)
        if: steps.cache.outputs.cache-hit != 'true'
        run: pnpm --filter design-system-styles exec playwright test --update-snapshots --config=playwright.config.ts

      - name: 🧪 Run visual tests
        run: pnpm --filter design-system-styles exec playwright test --config=playwright.config.ts

      - name: 📤 Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/styles/visual-tests/playwright-report/
