name: Run Visual Regression Tests

on:
  workflow_run:
    workflows: ['Deploy Documentation Preview']
    types:
      - completed

jobs:
  visual-tests:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-pnpm

      - name: Download build artifacts (optional if needed)
        uses: ./.github/actions/artifact-download
        with:
          name: design-system-documentation
          folder: build-output

      - name: Get preview URL from deploy step
        uses: actions/github-script@v7
        id: get-preview-url
        with:
          script: |
            const runId = ${{ github.event.workflow_run.id }};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'deploy-documentation-preview.yml',
            });

            const previewRun = runs.data.workflow_runs.find(run => run.id === runId);
            if (!previewRun) {
              throw new Error('Preview run not found');
            }

            // Replace this with how you store the preview URL
            const previewUrl = 'https://preview-<ID>--swisspost-design-system-next.netlify.app';
            core.setOutput('preview_url', previewUrl);

      - name: Run visual regression tests
        run: pnpm run styles:visual:test
        env:
          BASE_URL: ${{ steps.get-preview-url.outputs.preview_url }}
