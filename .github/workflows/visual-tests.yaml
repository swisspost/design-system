name: Visual Regression Tests

on:
  pull_request:
    branches: main

jobs:
  visual-tests:
    name: Run Visual Regression Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm & node
        uses: ./.github/actions/setup-pnpm

      - name: Install & bootstrap all packages
        run: |
          pnpm bootstrap

      - name: Install Playwright browsers
        run: pnpm --filter design-system-styles exec playwright install

      - name: Run visual regression tests
        run: |
          pnpm exec start-server-and-test 'pnpm docs:start' 9000 'pnpm styles:visual:test'

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            visual-tests/__screenshots__/
            visual-tests/playwright-report/
            visual-tests/test-results/

      - name: Generate summary for visual test results
        if: failure()
        run: |
          echo "## ❌ Visual Regression Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: [${GITHUB_SHA}](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA})" >> $GITHUB_STEP_SUMMARY
          echo "- 📸 Snapshot diffs and Playwright report saved to artifact: \`visual-test-results\`" >> $GITHUB_STEP_SUMMARY
          echo "- Download it from the **Artifacts** section below to review failures." >> $GITHUB_STEP_SUMMARY
