name: Visual Regression Tests
on:
  pull_request:
    branches: [main]  # or your main branch name

jobs:
  visual-tests:
    name: Run Visual Regression Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm & node
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run visual tests
        run: BASE_URL=${{ needs.deploy.outputs.preview-url }} pnpm styles:visual:test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            visual-tests/__screenshots__/
            visual-tests/playwright-report/
            visual-tests/test-results/

      - name: Comment test results
        if: failure()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const message = `❌ Visual regression tests failed for [${{ github.sha }}](${{ github.repository }}/commit/${{ github.sha }})
            [View test results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: message
            });
