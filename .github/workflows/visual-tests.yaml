name: Visual Tests

on:
  pull_request:
    paths:
      - 'packages/styles/visual-tests/**'
      - 'packages/styles/**'
    branches:
      - main

jobs:
  visual-tests:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install
          cd packages/styles
          pnpm add -D @playwright/test
          pnpm exec playwright install --with-deps
          cd ../..

      - name: Build packages
        run: pnpm -r --filter "!*-integration" build

      - name: Set up cache for snapshots
        id: cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-visual-snapshots-${{ hashFiles('packages/styles/visual-tests/**') }}
          path: |
            packages/styles/visual-tests/__screenshots__
            packages/styles/visual-tests/test-results
            packages/styles/playwright-report
          restore-keys: |
            ${{ runner.os }}-visual-snapshots-

      - name: Run visual tests with Storybook
        run: |
          cd packages/styles
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            pnpm exec start-server-and-test 'pnpm docs:headless' http://localhost:9000 'playwright test --config=./playwright.config.ts'
          else
            pnpm exec start-server-and-test 'pnpm docs:headless' http://localhost:9000 'playwright test --config=./playwright.config.ts --update-snapshots'
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            packages/styles/visual-tests/test-results
            packages/styles/playwright-report
          retention-days: 7
