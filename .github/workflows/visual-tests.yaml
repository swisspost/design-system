name: Visual Tests

on:
  pull_request:
    paths:
      - 'packages/styles/visual-tests/**'
      - 'packages/styles/**'
    branches:
      - main

jobs:
  visual-tests:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup-pnpm

      - name: Install dependencies and build packages
        run: pnpm bootstrap

      - name: Install Playwright
        run: |
          cd packages/styles
          pnpm add -D @playwright/test
          pnpm exec playwright install --with-deps

      - name: Set up cache for snapshots
        id: cache
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-visual-snapshots-${{ hashFiles('packages/styles/visual-tests/**') }}
          path: |
            packages/styles/visual-tests/__screenshots__
            packages/styles/visual-tests/test-results
            packages/styles/visual-tests/playwright-report
          restore-keys: |
            ${{ runner.os }}-visual-snapshots-

      - name: Initialize snapshots if cache missed
        if: ${{ steps.cache.outputs.cache-hit != 'true' }}
        run: |
          cd packages/styles
          pnpm exec playwright test --config=visual-tests/playwright.config.ts --update-snapshots

      - name: Run visual tests
        run: |
          cd packages/styles
          pnpm exec playwright test --config=visual-tests/playwright.config.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: |
            packages/styles/visual-tests/test-results
            packages/styles/visual-tests/playwright-report
          retention-days: 7

