name: E2E tests (playwright)
on:
  pull_request:
    paths:
      - 'packages/tokens/tokensstudio-generated/tokens.json'
      - 'packages/styles/**'
      - 'packages/components/**'
      - 'packages/components-react/**'
      - 'packages/components-angular/**'
      - 'apps/integration-next/**'

permissions:
  contents: read

jobs:
  e2e-nextjs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup-pnpm

      - name: Install & build dependencies
        run: pnpm e2e:next:ci

      - name: Install Playwright Browsers
        run: pnpm --filter design-system-integration-next exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm --filter design-system-integration-next e2e

  e2e-angular:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup-pnpm

      - name: Install & build dependencies
        run: pnpm e2e:angular:ci

      - name: Build consumer app
        run: pnpm --filter design-system-integration-angular exec ng build

      - name: Install Playwright browsers
        run: pnpm --filter design-system-integration-angular playwright:install

      - name: Run tests
        run: pnpm --filter design-system-integration-angular e2e:ci

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-results-angular
          path: apps/integration-angular/playwright/results
          retention-days: 14
